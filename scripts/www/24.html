<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>速算24点</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body {
    background: #e9ecef;
    display: flex;
    justify-content: center;
    align-items: center; /* 👈 就改这一句：垂直居中 */
    min-height: 100vh;
    padding: 10px;
}

.app-card {
    width: 85%;
    max-width: 340px;
    background: #f7f8fa;
    padding: 12px;
    border-radius: 24px;
    box-shadow: 0 0 30px rgba(0,0,0,0.1);
}

.container {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.top-bar {
    background: #ffffff;
    border-radius: 16px;
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.top-bar .title {
    font-size: 18px;
    font-weight: 600;
    color: #222;
}
.top-bar .score {
    font-size: 15px;
    color: #666;
}
.back-btn {
    background: #f1f3f5;
    border: none;
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 14px;
    color: #333;
}

.num-board {
    display: flex;
    gap: 10px;
}
.num-card {
    flex: 1;
    aspect-ratio: 1 / 1;
    background: #ffffff;
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 44px;
    font-weight: 600;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}
.num-card:nth-child(1) { color: #4263EB; }
.num-card:nth-child(2) { color: #0CA678; }
.num-card:nth-child(3) { color: #F59E0B; }
.num-card:nth-child(4) { color: #E02424; }

.input-bar {
    background: #ffffff;
    border: 1px solid #e9ecef;
    border-radius: 14px;
    height: 48px;
    padding: 0 16px;
    font-size: 20px;
    text-align: right;
    line-height: 48px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.04);
}

.msg {
    text-align: center;
    font-size: 15px;
    height: 20px;
    color: #444;
}

.keypad {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 7px;
}

.key {
    height: 48px;
    border-radius: 12px;
    border: none;
    font-size: 17px;
    font-weight: 600;
    background: #ffffff;
    color: #222;
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
}
.key.num { background: #eef2ff; color: #3f51b5; }
.key.op { background: #f0f7ff; color: #1976d2; }
.key.func { background: #fff4e6; color: #f57c00; }

.confirm {
    width: 100%;
    height: 54px;
    border-radius: 16px;
    border: none;
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    background: #22c55e;
    box-shadow: 0 3px 10px rgba(34, 197, 94, 0.25);
}

.foot-row {
    display: flex;
    gap: 10px;
}
.foot-btn {
    flex: 1;
    height: 50px;
    border-radius: 14px;
    border: none;
    font-size: 16px;
    font-weight: 500;
}
.ans-btn { background: #fef3c7; color: #d97706; }
.next-btn { background: #dbeafe; color: #2563eb; }
</style>
</head>
<body>

<div class="app-card">
    <div class="container">
        <div class="top-bar">
            <button class="back-btn" onclick="goBack()">返回</button>
            <div class="title">速算24点</div>
            <div class="score" id="score">分数：0</div>
        </div>

        <div class="num-board">
            <div class="num-card" id="n0">0</div>
            <div class="num-card" id="n1">0</div>
            <div class="num-card" id="n2">0</div>
            <div class="num-card" id="n3">0</div>
        </div>

        <div class="input-bar" id="input" readonly></div>
        <div class="msg" id="msg"></div>

        <div class="keypad">
            <button class="key num" onclick="put(0)">0</button>
            <button class="key num" onclick="put(1)">0</button>
            <button class="key num" onclick="put(2)">0</button>
            <button class="key num" onclick="put(3)">0</button>

            <button class="key op" onclick="sym('+','加')">+</button>
            <button class="key op" onclick="sym('-','减')">-</button>
            <button class="key op" onclick="sym('*','乘')">×</button>
            <button class="key op" onclick="sym('/','除')">÷</button>

            <button class="key op" onclick="sym('(', '左括号')">(</button>
            <button class="key op" onclick="sym(')', '右括号')">)</button>
            <button class="key func" onclick="clearAll()">清空</button>
            <button class="key func" onclick="back()">退格</button>
        </div>

        <button class="confirm" onclick="check()">确定</button>

        <div class="foot-row">
            <button class="foot-btn ans-btn" onclick="showAnswer()">查看答案</button>
            <button class="foot-btn next-btn" onclick="next()">下一题</button>
        </div>
    </div>
</div>

<script>
const input = document.getElementById('input');
const msg = document.getElementById('msg');
const scoreText = document.getElementById('score');
const numCard = [n0,n1,n2,n3];
const keys = document.querySelectorAll('.key.num');

let score = 0;
let nums = [0,0,0,0];

function vibrate() { if (navigator.vibrate) navigator.vibrate(30); }
function speak(text) {
    if (!window.speechSynthesis) return;
    let u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN';
    speechSynthesis.speak(u);
}

function next() {
    for (let i=0; i<4; i++) nums[i] = Math.floor(Math.random()*10)+1;
    numCard.forEach((e,i)=>e.textContent=nums[i]);
    keys.forEach((e,i)=>e.textContent=nums[i]);
    input.textContent = '';
    msg.textContent = '';
}

function put(i) { vibrate(); input.textContent += nums[i]; speak(String(nums[i])); }
function sym(s, text) { vibrate(); input.textContent += s; speak(text); }
function clearAll() { vibrate(); input.textContent = ''; speak('清空'); }
function back() { vibrate(); input.textContent = input.textContent.slice(0,-1); speak('退格'); }
function goBack() { location.href='index.html'; }

function check() {
    vibrate();
    let s = input.textContent.trim().replace(/×/g,'*').replace(/÷/g,'/');
    if (!s) { msg.textContent='请输入算式'; speak('请输入算式'); return; }
    try {
        let r = eval(s);
        if (Math.abs(r-24) < 1e-6) {
            msg.textContent='✅ 正确'; speak('正确');
            score+=10; scoreText.textContent='分数：'+score;
            setTimeout(next,1400);
        } else { msg.textContent='❌ 错误'; speak('错误'); }
    } catch(e) { msg.textContent='❌ 格式错误'; speak('格式错误'); }
}

function showAnswer() {
    vibrate();
    msg.textContent='计算中...';
    setTimeout(()=>{
        let r = solve24(nums);
        if(r) msg.textContent='答案：'+r;
        else { msg.textContent='本题无解'; speak('本题无解'); }
    },10);
}

function solve24(arr) {
    const ops = ['+','-','*','/'];
    const forms = [
        "(({0}{4}{1}){5}{2}){6}{3}",
        "({0}{4}({1}{5}{2})){6}{3}",
        "{0}{4}(({1}{5}{2}){6}{3})",
        "{0}{4}({1}{5}({2}{6}{3}))",
        "({0}{4}{1}){5}({2}{6}{3})"
    ];
    function permute(a){ if(a.length===1)return[a]; let r=[];
        for(let i=0;i<a.length;i++){ let r2=[...a.slice(0,i),...a.slice(i+1)];
        for(let p of permute(r2)) r.push([a[i],...p]); } return r;
    }
    for(let p of permute(arr)){
        for(let o1 of ops){ for(let o2 of ops){ for(let o3 of ops){
            for(let f of forms){
                let e=f.replace('{0}',p[0]).replace('{1}',p[1])
                       .replace('{2}',p[2]).replace('{3}',p[3])
                       .replace('{4}',o1).replace('{5}',o2).replace('{6}',o3);
                try{ if(Math.abs(eval(e)-24)<1e-6)return e+'=24'; }catch{}
            }
        }}}
    }
    return null;
}

window.onload = next;
window.addEventListener('pagehide', function() {
  document.removeEventListener('keydown', window.keyListener);
});

</script>
</body>
</html>
