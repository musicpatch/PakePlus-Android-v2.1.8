<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>消消乐</title>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
body {
  background: #363d4a;
  color: #e6e9ef;
  font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
  text-align: center;
  padding: 14px;
}

.title {
  font-size: 24px;
  font-weight: bold;
  margin-bottom: 10px;
  color: #f03fa6;
}

.timer-container {
  width: 100%;
  max-width: 330px;
  margin: 0 auto 12px auto;
}
.timer-text {
  font-size: 15px;
  margin-bottom: 4px;
  color: #b8c0d0;
}
.timer-bar {
  height: 12px;
  background: #444b5a;
  border-radius: 6px;
  overflow: hidden;
}
.timer-progress {
  height: 100%;
  width: 100%;
  background: #6fb390;
  transition: width 0.9s linear;
}

#board {
  display: inline-grid;
  grid-template-columns: repeat(5, 55px);
  gap: 6px;
  background: #404756;
  padding: 16px;
  border-radius: 20px;
  box-shadow: 0 0 12px rgba(0,0,0,0.25);
  border: 2px solid #4c556a;
  margin-bottom: 14px;
}

.cell {
  width: 55px;
  height: 55px;
  border-radius: 50%;
  position: relative;
  cursor: pointer;
  transition: transform 0.22s ease;
  overflow: hidden;
  clip-path: circle(50%);
  outline: none !important;
  border: none !important;
}
.cell.selected {
  transform: scale(1.08);
  animation: breathe 1.2s infinite alternate;
  border-radius: 50%;
  clip-path: circle(50%);
  outline: none !important;
}
@keyframes breathe {
  from { transform: scale(1.06); }
  to   { transform: scale(1.1); }
}

.cell.removing {
  animation: removeAnim 0.3s forwards;
}
@keyframes removeAnim {
  0%   { opacity:1; transform: scale(1); }
  50%  { opacity:0.8; transform: scale(1.25); box-shadow: 0 0 12px #fff; }
  100% { opacity:0; transform: scale(0.4); }
}

.cell-gem {
  position: absolute;
  left: 0; top: 0;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  box-shadow: inset 0 6px 8px rgba(255,255,255,0.25), inset 0 -4px 6px rgba(0,0,0,0.15), 0 2px 3px rgba(0,0,0,0.2);
}

.c1 { background: radial-gradient(circle, #fff 0%, #d47878 70%, #b86060 100%); }
.c2 { background: radial-gradient(circle, #fff 0%, #7296c7 70%, #5a7fb3 100%); }
.c3 { background: radial-gradient(circle, #fff 0%, #d9b86a 70%, #bfa256 100%); }
.c4 { background: radial-gradient(circle, #fff 0%, #66aa7e 70%, #509468 100%); }
.c5 { background: radial-gradient(circle, #fff 0%, #9c83c7 70%, #856cb0 100%); }
.c6 { background: radial-gradient(circle, #fff 0%, #c17ea3 70%, #a9688c 100%); }

.cell-char {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  width: 46px;
  height: 46px;
  object-fit: cover;
  border-radius: 50%;
  z-index: 3;
  opacity: 1;
  -webkit-mask-image: radial-gradient(circle, rgba(0,0,0,1) 10%, rgba(0,0,0,0) 100%);
  mask-image: radial-gradient(circle, rgba(0,0,0,1) 10%, rgba(0,0,0,0) 100%);
  mix-blend-mode: normal;
  filter: none;
  box-shadow: none;
  outline: none !important;
}

#score {
  font-size: 19px;
  font-weight: bold;
  margin-bottom: 6px;
}
#message {
  font-size: 14px;
  color: #b8c0d0;
  margin-bottom: 12px;
  min-height: 18px;
}

.button-row {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-top: 6px;
}
.button-row button {
  flex: 1;
  max-width: 140px;
  border: none;
  padding: 10px 0;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  outline: none;
}

.btn-pause { background: #5b7bb0; color: #fff; }
.btn-restart { background: #66aa7e; color: #fff; }

.overlay {
  position: fixed;
  left: 0; top: 0;
  width: 100vw; height: 100vh;
  background: rgba(0,0,0,0.5);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
}
.overlay.show { display: flex; }
.popup {
  background: #2d3748;
  width: 90%;
  max-width: 340px;
  padding: 24px;
  border-radius: 16px;
  color: #fff;
  text-align: center;
}
.popup h2 {
  margin-bottom: 10px;
  color: #f03fa6;
}
.popup p {
  margin: 6px 0;
}
.popup input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
  font-size: 16px;
  text-align: center;
}
.rank-list {
  max-height: 180px;
  overflow-y: auto;
  margin: 12px 0;
  text-align: left;
}
.rank-item {
  display: flex;
  justify-content: space-between;
  padding: 6px 10px;
  background: #374151;
  border-radius: 6px;
  margin-bottom: 6px;
}
.rank-item .name { font-weight: 500; }
.rank-item .s { color: #f03fa6; font-weight: bold; }
.popup button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  border-radius: 10px;
  border: none;
  background: #6fb390;
  color: #fff;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>
<body>

<div class="title">消消乐</div>

<div class="timer-container">
  <div class="timer-text" id="timerText">剩余时间：60 秒</div>
  <div class="timer-bar">
    <div class="timer-progress" id="timerProgress"></div>
  </div>
</div>

<div id="board"></div>
<div id="score">分数：0</div>
<div id="message">点击相邻棋子交换</div>

<div class="button-row">
  <button id="pauseBtn" class="btn-pause">暂停</button>
  <button id="restartBtn" class="btn-restart">重新开始</button>
</div>

<div class="overlay" id="gameOverOverlay">
  <div class="popup">
    <h2>游戏结束</h2>
    <p id="endReason"></p>
    <p>本次得分：<span id="finalScore">0</span></p>

    <input type="text" id="playerName" placeholder="请输入你的名字" autocomplete="off">
    <button onclick="saveScore()">保存得分</button>

    <h3 style="margin-top:16px;">🏆 排行榜</h3>
    <div class="rank-list" id="rankList"></div>

    <button onclick="restartGame()" style="background:#5b7bb0;">再来一局</button>
  </div>
</div>

<script>
const ROWS = 8;
const COLS = 5;
const COLOR_TYPES = 6;
const MAX_TIME = 60;

const SCORE_3 = 10;
const SCORE_4 = 20;
const SCORE_5 = 35;
const ADD_SEC_3 = 2;
const ADD_SEC_4 = 4;
const ADD_SEC_5 = 6;

let board = [];
let score = 0;
let selected = null;
let lock = false;
let gameOver = false;
let paused = false;
let charMap = {};
let timeLeft = MAX_TIME;
let timerInterval;

const allChars = [
  "Stewie","Quagmire","Peter","Mort","Meg","Lois","Joe",
  "Jillian","Herbert","MortGoldman","EvilMonkey","Cleveland","Chris","Carter","Brian","Bonnie"
];

const boardEl = document.getElementById("board");
const scoreEl = document.getElementById("score");
const msgEl = document.getElementById("message");
const timerText = document.getElementById("timerText");
const timerProgress = document.getElementById("timerProgress");
const pauseBtn = document.getElementById("pauseBtn");
const restartBtn = document.getElementById("restartBtn");
const overlay = document.getElementById("gameOverOverlay");

// ======================
// 音频（和2048统一路径）
// ======================
let audioUnlocked = false;

const slideSound  = new Audio("2046/slide.mp3");
const mergeSound  = new Audio("2046/merge.mp3");
const winnerSound = new Audio("2046/winner.mp3");
const loseSound   = new Audio("2046/lose.mp3");

function playSound(sound) {
  try {
    sound.currentTime = 0;
    sound.play().catch(() => {});
  } catch (e) {}
}

function unlockAudio() {
  if (audioUnlocked) return;
  audioUnlocked = true;
  document.removeEventListener("click", unlockAudio);
  document.removeEventListener("touchstart", unlockAudio);
}

document.addEventListener("click", unlockAudio);
document.addEventListener("touchstart", unlockAudio);

restartBtn.onclick = restartGame;

// ======================
// 排行榜
// ======================
function getRank() {
  let data = localStorage.getItem("gameRank");
  return data ? JSON.parse(data) : [];
}
function saveRank(list) {
  localStorage.setItem("gameRank", JSON.stringify(list));
}
function saveScore() {
  const name = document.getElementById("playerName").value.trim();
  if (!name) {
    alert("请输入名字");
    return;
  }
  let rank = getRank();
  rank.push({ name: name, score: score });
  rank.sort((a, b) => b.score - a.score);
  if (rank.length > 20) rank = rank.slice(0, 20);
  saveRank(rank);
  showRank();
}
function showRank() {
  const rank = getRank();
  const el = document.getElementById("rankList");
  el.innerHTML = "";
  rank.forEach((item, i) => {
    const div = document.createElement("div");
    div.className = "rank-item";
    div.innerHTML = `<span class="name">${i+1}. ${item.name}</span><span class="s">${item.score}分</span>`;
    el.appendChild(div);
  });
}

// ======================
// 震动
// ======================
function vibrate(ms = 20) {
  if (navigator.vibrate) navigator.vibrate(ms);
}

pauseBtn.onclick = () => {
  if (gameOver) return;
  paused = !paused;
  pauseBtn.textContent = paused ? "继续" : "暂停";
};

// ======================
// 棋盘生成
// ======================
function generateSafeBoard() {
  let b;
  let safe = false;
  while (!safe) {
    b = [];
    for (let r = 0; r < ROWS; r++) {
      let row = [];
      for (let c = 0; c < COLS; c++) {
        let rand;
        do {
          rand = 1 + Math.floor(Math.random() * COLOR_TYPES);
        } while (
          (c >= 2 && row[c-1] === rand && row[c-2] === rand) ||
          (r >= 2 && b[r-1][c] === rand && b[r-2][c] === rand)
        );
        row.push(rand);
      }
      b.push(row);
    }
    safe = !hasAnyMatch(b);
  }
  return b;
}

function hasAnyMatch(b) {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS - 2; c++) {
      const v = b[r][c];
      if (v && v === b[r][c+1] && v === b[r][c+2]) return true;
    }
  }
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS - 2; r++) {
      const v = b[r][c];
      if (v && v === b[r+1][c] && v === b[r+2][c]) return true;
    }
  }
  return false;
}

// ======================
// 初始化
// ======================
function initBoard() {
  clearInterval(timerInterval);
  timeLeft = MAX_TIME;
  score = 0;
  selected = null;
  lock = false;
  gameOver = false;
  paused = false;
  pauseBtn.textContent = "暂停";
  overlay.classList.remove("show");
  updateTimerUI();
  pickRandomChars();

  board = generateSafeBoard();
  redraw();
  startTimer();

  // 开局 → 胜利音效
  playSound(winnerSound);
}

function reshuffleBoard() {
  selected = null;
  lock = true;
  msgEl.textContent = "无子可消，自动重整棋盘...";
  setTimeout(() => {
    board = generateSafeBoard();
    redraw();
    lock = false;
    msgEl.textContent = "点击相邻棋子交换";
  }, 600);
}

function pickRandomChars() {
  const tmp = [...allChars].sort(() => Math.random() - 0.5);
  const list = tmp.slice(0, COLOR_TYPES);
  for (let i = 1; i <= COLOR_TYPES; i++) {
    charMap[i] = list[i - 1];
  }
}

// ======================
// 绘制
// ======================
function redraw() {
  boardEl.innerHTML = "";
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const v = board[r][c];
      const cell = document.createElement("div");
      cell.className = "cell";
      cell.dataset.r = r;
      cell.dataset.c = c;
      cell.onclick = clickCell;
      cell.setAttribute("tabindex", "-1");

      const gem = document.createElement("div");
      gem.className = "cell-gem c" + v;

      const img = document.createElement("img");
      img.src = "images/" + charMap[v] + ".png";
      img.className = "cell-char";
      img.onerror = () => {
        img.style.display = "none";
        const span = document.createElement("div");
        span.textContent = charMap[v].substring(0, 2);
        span.style.position = "absolute";
        span.style.left = "50%";
        span.style.top = "50%";
        span.style.transform = "translate(-50%,-50%)";
        span.style.color = "#fff";
        span.style.fontWeight = "bold";
        cell.appendChild(span);
      };

      cell.appendChild(gem);
      cell.appendChild(img);

      if (selected && selected.r === r && selected.c === c) {
        cell.classList.add("selected");
      }

      boardEl.appendChild(cell);
    }
  }
  scoreEl.textContent = "分数：" + score;
}

// ======================
// 点击逻辑
// ======================
function clickCell(e) {
  if (lock || gameOver || paused) return;
  const r = parseInt(e.currentTarget.dataset.r);
  const c = parseInt(e.currentTarget.dataset.c);

  if (!selected) {
    // 点选棋子 → slide
    selected = { r, c };
    playSound(slideSound);
    redraw();
    return;
  }

  const dr = Math.abs(selected.r - r);
  const dc = Math.abs(selected.c - c);
  if (dr + dc !== 1) {
    // 重新选另一个 → slide
    selected = { r, c };
    playSound(slideSound);
    redraw();
    return;
  }

  // 交换 → slide
  swap(selected.r, selected.c, r, c);
  playSound(slideSound);
  vibrate();

  const matches = findMatches();
  if (matches.length === 0) {
    swap(selected.r, selected.c, r, c);
    msgEl.textContent = "无法消除";
    selected = null;
    redraw();
    return;
  }

  selected = null;
  processChain();
}

function swap(r1, c1, r2, c2) {
  const temp = board[r1][c1];
  board[r1][c1] = board[r2][c2];
  board[r2][c2] = temp;
}

// ======================
// 消除匹配
// ======================
function findMatches() {
  const mark = Array(ROWS).fill().map(() => Array(COLS).fill(false));
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS - 2; c++) {
      const v = board[r][c];
      if (v && v === board[r][c+1] && v === board[r][c+2]) {
        mark[r][c] = mark[r][c+1] = mark[r][c+2] = true;
      }
    }
  }
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS - 2; r++) {
      const v = board[r][c];
      if (v && v === board[r+1][c] && v === board[r+2][c]) {
        mark[r][c] = mark[r+1][c] = mark[r+2][c] = true;
      }
    }
  }
  const list = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (mark[r][c]) list.push({ r, c });
    }
  }
  return list;
}

async function processChain() {
  lock = true;
  while (true) {
    const ms = findMatches();
    if (ms.length === 0) break;

    const n = ms.length;
    let addSc = 0, addTm = 0;
    if (n >= 5) {
      addSc = SCORE_5;
      addTm = ADD_SEC_5;
    } else if (n >= 4) {
      addSc = SCORE_4;
      addTm = ADD_SEC_4;
    } else {
      addSc = SCORE_3;
      addTm = ADD_SEC_3;
    }

    score += addSc;
    timeLeft = Math.min(timeLeft + addTm, MAX_TIME);
    updateTimerUI();

    // 消除 → merge
    playSound(mergeSound);
    vibrate(30);

    ms.forEach(({ r, c }) => {
      const cell = boardEl.children[r * COLS + c];
      cell.classList.add("removing");
    });
    await delay(280);

    ms.forEach(({ r, c }) => (board[r][c] = 0));
    redraw();
    await delay(100);

    // 下落
    for (let c = 0; c < COLS; c++) {
      const col = [];
      for (let r = 0; r < ROWS; r++) {
        if (board[r][c]) col.push(board[r][c]);
      }
      for (let r = 0; r < ROWS; r++) {
        board[r][c] = r >= ROWS - col.length ? col[r - (ROWS - col.length)] : 0;
      }
    }
    redraw();
    await delay(300);

    // 新方块
    for (let c = 0; c < COLS; c++) {
      for (let r = 0; r < ROWS; r++) {
        if (!board[r][c]) {
          board[r][c] = 1 + Math.floor(Math.random() * COLOR_TYPES);
        }
      }
    }
    redraw();
    await delay(200);
  }

  lock = false;
  msgEl.textContent = "点击相邻棋子交换";

  if (!hasValidMove()) {
    reshuffleBoard();
  }
}

function hasValidMove() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
      for (const [dr, dc] of dirs) {
        const nr = r + dr;
        const nc = c + dc;
        if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) continue;
        swap(r, c, nr, nc);
        const ok = findMatches().length > 0;
        swap(r, c, nr, nc);
        if (ok) return true;
      }
    }
  }
  return false;
}

// ======================
// 计时器
// ======================
function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (paused || gameOver) return;
    timeLeft--;
    updateTimerUI();
    if (timeLeft <= 0) {
      endGame("时间到！");
    }
  }, 1000);
}

function updateTimerUI() {
  timerText.textContent = `剩余时间：${timeLeft} 秒`;
  timerProgress.style.width = ((timeLeft / MAX_TIME) * 100) + "%";
}

// ======================
// 结束游戏
// ======================
function endGame(reason) {
  clearInterval(timerInterval);
  gameOver = true;
  // 结束 → lose
  playSound(loseSound);
  document.getElementById("endReason").textContent = reason;
  document.getElementById("finalScore").textContent = score;
  overlay.classList.add("show");
  showRank();
}

function restartGame() {
  initBoard();
}

function delay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

initBoard();

window.addEventListener('pagehide', function() {
  document.removeEventListener('keydown', window.keyListener);
});

</script>
</body>
</html>
