<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>复古竖屏4:3 - 像素小鸟</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
  body{
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
  }

  #game-container {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: #222;
  }

  #canvas-wrapper {
    flex: 1;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 10px;
  }

  #canvas {
    display: block;
    border: 3px solid #444;
    background: #000;
    width: 100%;
    max-width: 90vh;
    aspect-ratio: 4 / 3;
  }

  #score-bar {
    height: 60px;
    background: linear-gradient(180deg, #333, #444);
    display: flex;
    justify-content: center;
    align-items: center;
    color: #ffd700;
    font-size: 22px;
    font-weight: bold;
  }

  #startUI, #gameOver {
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%);
    background:#fff; padding:20px 26px;
    border-radius:12px; text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
    z-index:10;
  }
  #startUI h2, #gameOver h3{color:#222;margin-bottom:12px;}
  #diffSlider{width:180px;margin:8px 0;}
  #diffText{color:#555;margin-bottom:16px;}
  #startBtn, #restartBtn{
    padding:8px 22px; border:none; border-radius:10px;
    font-size:16px; cursor:pointer;
  }
  #startBtn{background:#222;color:#fff;}
  #restartBtn{background:#ffd700;color:#222;margin-top:12px;}
</style>
</head>
<body>

<div id="game-container">
  <div id="canvas-wrapper">
    <canvas id="canvas"></canvas>
  </div>
  <div id="score-bar">分数: <span id="score">0</span></div>
</div>

<div id="startUI">
  <h2>复古像素小鸟</h2>
  <input type="range" min="1" max="3" value="1" id="diffSlider">
  <div id="diffText">难度：简单</div>
  <button id="startBtn">开始游戏</button>
</div>

<div id="gameOver" style="display:none;">
  <h3>游戏结束</h3>
  <p>得分：<span id="finalScore">0</span></p>
  <button id="restartBtn">重新开始</button>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const GAME_WIDTH = 480;
const GAME_HEIGHT = 360;
canvas.width = GAME_WIDTH;
canvas.height = GAME_HEIGHT;

const scoreEl = document.getElementById('score');
const startUI = document.getElementById('startUI');
const diffSlider = document.getElementById('diffSlider');
const diffText = document.getElementById('diffText');
const startBtn = document.getElementById('startBtn');
const gameOverUI = document.getElementById('gameOver');
const finalScoreEl = document.getElementById('finalScore');
const restartBtn = document.getElementById('restartBtn');

let gameStarted = false;
let gameOver = false;
let score = 0;
let pipes = [];
let spawnTimer = 0;

let bird = {
  x: GAME_WIDTH * 0.2,
  y: GAME_HEIGHT / 2,
  r: 18,
  vy: 0,
  gravity: 0.22,
  jump: -5.0
};

const pipeWidth = 32;
let pipeSpeed = 1.3;

// 精灵图配置（你的3帧图）
const birdSprite = new Image();
birdSprite.src = 'images/bird.png';
const frameCount = 3;
const frameW = 64;
const frameH = 64;
let currentFrame = 0;
let frameTimer = 0;
const frameSpeed = 5;

diffSlider.oninput = function(){
  const v = this.value;
  if(v == 1){
    bird.gravity = 0.20;
    bird.jump = -4.8;
    pipeSpeed = 1.1;
    diffText.textContent = "难度：简单";
  }else if(v == 2){
    bird.gravity = 0.24;
    bird.jump = -5.2;
    pipeSpeed = 1.4;
    diffText.textContent = "难度：中等";
  }else{
    bird.gravity = 0.28;
    bird.jump = -5.6;
    pipeSpeed = 1.7;
    diffText.textContent = "难度：困难";
  }
};

function getRandomGap(){
  const v = diffSlider.value;
  if(v == 1){
    return Math.random() * 40 + 180;
  }else if(v == 2){
    return Math.random() * 30 + 140;
  }else{
    return Math.random() * 30 + 110;
  }
}

function spawnPipe(){
  const gap = getRandomGap();
  const minTop = 20;
  const maxTop = GAME_HEIGHT - gap - minTop;
  const topH = Math.random() * (maxTop - minTop) + minTop;
  
  pipes.push({
    x: GAME_WIDTH,
    top: topH,
    bottom: topH + gap,
    scored: false
  });
}

// 绘制精灵图动画（替换原来的圆形小鸟）
function drawBird(){
  const sx = currentFrame * frameW;
  ctx.drawImage(
    birdSprite,
    sx, 0, frameW, frameH,
    bird.x - frameW/2, bird.y - frameH/2,
    frameW, frameH
  );

  frameTimer++;
  if(frameTimer >= frameSpeed){
    currentFrame = (currentFrame + 1) % frameCount;
    frameTimer = 0;
  }
}

function drawPipe(p){
  ctx.fillStyle = '#222';
  ctx.fillRect(p.x, 0, pipeWidth, p.top);
  ctx.fillRect(p.x, p.bottom, pipeWidth, GAME_HEIGHT - p.bottom);
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 1;
  ctx.strokeRect(p.x, 0, pipeWidth, p.top);
  ctx.strokeRect(p.x, p.bottom, pipeWidth, GAME_HEIGHT - p.bottom);
}

function drawBackground(){
  ctx.fillStyle = '#f2f2f2';
  ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
  ctx.fillStyle = '#999';
  ctx.fillRect(0, GAME_HEIGHT - 40, GAME_WIDTH, 40);
}

function update(){
  drawBackground();

  if(!gameStarted || gameOver) return;

  bird.vy += bird.gravity;
  bird.y += bird.vy;

  spawnTimer++;
  if(spawnTimer > 120){
    spawnPipe();
    spawnTimer = 0;
  }

  for(let i=pipes.length-1; i>=0; i--){
    const p = pipes[i];
    p.x -= pipeSpeed;
    drawPipe(p);

    if(p.x + pipeWidth < 0){
      pipes.splice(i,1);
      continue;
    }
    
    if(!p.scored && p.x + pipeWidth < bird.x - bird.r){
      score++;
      scoreEl.textContent = score;
      p.scored = true;
    }

    if(
      bird.x + bird.r > p.x && bird.x - bird.r < p.x + pipeWidth &&
      (bird.y - bird.r < p.top || bird.y + bird.r > p.bottom)
    ){
      endGame();
    }
  }

  if(bird.y - bird.r < 0 || bird.y + bird.r > GAME_HEIGHT){
    endGame();
  }
  
  drawBird();
}

function jump(){
  if(!gameStarted || gameOver) return;
  bird.vy = bird.jump;
}

function endGame(){
  gameOver = true;
  finalScoreEl.textContent = score;
  gameOverUI.style.display = 'block';
}

function resetGame(){
  gameOver = false;
  gameStarted = false;
  score = 0;
  pipes = [];
  bird.y = GAME_HEIGHT/2;
  bird.vy = 0;
  scoreEl.textContent = score;
  gameOverUI.style.display = 'none';
  startUI.style.display = 'block';
}

canvas.addEventListener('click', jump);
canvas.addEventListener('touchend', e=>{
  e.preventDefault();
  jump();
});

startBtn.onclick = ()=>{
 gameStarted = true;
  startUI.style.display = 'none';
};

restartBtn.onclick = resetGame;

function loop(){
  update();
  requestAnimationFrame(loop);
}
loop();
window.addEventListener('pagehide', function() {
  document.removeEventListener('keydown', window.keyListener);
});

</script>
</body>
</html>
