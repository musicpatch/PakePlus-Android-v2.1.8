<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>西游猜猜看</title>
<style>
  *{
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: "微软雅黑", "Microsoft YaHei", sans-serif;
  }
  body{
    background-color: #f5f5f5;
    padding: 20px;
  }
  .game-container{
    max-width: 480px;
    margin: 0 auto;
    background-color: #fff;
    border-radius: 20px;
    padding: 30px 20px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    text-align: center;
  }
  .game-title{
    font-size: 30px;
    color: #c02e2e;
    margin-bottom: 25px;
    font-weight: bold;
  }
  .score-area{
    font-size: 18px;
    color: #333;
    margin-bottom: 20px;
  }
  .score-area span{
    color: #c02e2e;
    font-weight: bold;
  }
  .hint-area{
    background-color: #e8f4f8;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    min-height: 80px;
    font-size: 16px;
    color: #333;
    line-height: 1.5;
  }
  .answer-input{
    width: 100%;
    height: 50px;
    border: 1px solid #ddd;
    border-radius: 12px;
    padding: 0 15px;
    font-size: 18px;
    text-align: center;
    margin-bottom: 15px;
    outline: none;
  }
  .answer-input::placeholder{
    color: #999;
  }
  .game-btn{
    width: 100%;
    height: 50px;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    color: #fff;
    cursor: pointer;
    margin-bottom: 10px;
    transition: background-color 0.2s;
  }
  .btn-start{ background-color: #c02e2e; }
  .btn-hint{ background-color: #2185d0; }
  .btn-submit{ background-color: #21ba45; }
  .btn-answer{ background-color: #f2711c; }
  .btn-skip{ background-color: #6435c9; }
  .btn-exit{ background-color: #767676; }
  .game-btn:hover{ opacity: 0.9; }
  .game-btn:active{ transform: scale(0.98); }
  .game-btn:disabled{
    opacity: 0.6;
    cursor: not-allowed;
    transform: none !important;
  }
  /* 自定义弹窗样式（替代alert，去掉file://前缀） */
  .custom-alert{
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background-color: #fff;
    border-radius: 12px;
    padding: 25px 20px;
    min-width: 280px;
    max-width: 400px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    text-align: center;
    z-index: 9999;
    display: none;
  }
  .alert-content{
    font-size: 18px;
    color: #333;
    margin-bottom: 20px;
    line-height: 1.5;
  }
  .alert-btn{
    padding: 10px 25px;
    border: none;
    border-radius: 8px;
    background-color: #2185d0;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
  }
  .alert-mask{
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.3);
    z-index: 9998;
    display: none;
  }
</style>
</head>
<body>
<!-- 自定义弹窗（替代原生alert） -->
<div class="alert-mask" id="alertMask"></div>
<div class="custom-alert" id="customAlert">
  <div class="alert-content" id="alertContent"></div>
  <button class="alert-btn" id="alertBtn">确定</button>
</div>

<div class="game-container">
  <div class="game-title">西游猜猜看</div>
  <div class="score-area">当前积分：<span id="scoreNum">0</span></div>
  <div class="hint-area" id="hintBox">点击「开始游戏」按钮开始挑战</div>
  <input type="text" class="answer-input" id="answerInput" placeholder="请输入你猜测的西游人物名字">
  <!-- 按钮顺序：获取提示→提交答案→查看答案→跳过本题→开始游戏→退出游戏 -->
  <button class="game-btn btn-hint" disabled>获取提示</button>
  <button class="game-btn btn-submit" disabled>提交答案</button>
  <button class="game-btn btn-answer" disabled>查看答案</button>
  <button class="game-btn btn-skip" disabled>跳过本题</button>
  <button class="game-btn btn-start">开始游戏</button>
  <button class="game-btn btn-exit" disabled>退出游戏</button>
</div>

<script src="data.js"></script>
<script src="main.js"></script>
</body>
</html>
