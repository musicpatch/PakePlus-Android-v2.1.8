<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>水浒猜猜猜</title>
<style>
  *{
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: "微软雅黑", "宋体", sans-serif;
  }
  body{
    background-color: #f0e6d6; /* 仿古纸背景 */
    padding: 20px;
  }
  .game-container{
    max-width: 480px;
    margin: 0 auto;
    background-color: #fff;
    border-radius: 20px;
    padding: 30px 20px;
    box-shadow: 0 4px 15px rgba(139, 69, 19, 0.2); /* 红木色阴影 */
    text-align: center;
  }
  .game-title{
    font-size: 30px;
    color: #8B4513; /* 红木色 */
    margin-bottom: 25px;
    font-weight: bold;
  }
  .score-area{
    font-size: 18px;
    color: #333;
    margin-bottom: 20px;
  }
  .score-area span{
    color: #8B4513;
    font-weight: bold;
  }
  .hint-area{
    background-color: #f8f3eb;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    min-height: 80px;
    font-size: 16px;
    color: #333;
    line-height: 1.5;
    border: 1px solid #e0d2c0;
  }
  .answer-input{
    width: 100%;
    height: 50px;
    border: 1px solid #e0d2c0;
    border-radius: 12px;
    padding: 0 15px;
    font-size: 18px;
    text-align: center;
    margin-bottom: 15px;
    outline: none;
  }
  .answer-input::placeholder{
    color: #999;
  }
  .game-btn{
    width: 100%;
    height: 50px;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    color: #fff;
    cursor: pointer;
    margin-bottom: 10px;
    transition: background-color 0.2s;
  }
  .btn-start{ background-color: #8B4513; } /* 红木色-开始 */
  .btn-hint{ background-color: #2E8B57; } /* 深绿-提示 */
  .btn-submit{ background-color: #228B22; } /* 翠绿-提交 */
  .btn-answer{ background-color: #CD853F; } /* 秘鲁色-答案 */
  .btn-skip{ background-color: #4682B4; } /* 钢蓝-跳过 */
  .btn-exit{ background-color: #708090; } /* 灰蓝-退出 */
  .game-btn:hover{ opacity: 0.9; }
  .game-btn:active{ transform: scale(0.98); }
  .game-btn:disabled{
    opacity: 0.6;
    cursor: not-allowed;
    transform: none !important;
  }
  /* 自定义弹窗样式 */
  .custom-alert{
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background-color: #fff;
    border-radius: 12px;
    padding: 25px 20px;
    min-width: 280px;
    max-width: 400px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    text-align: center;
    z-index: 9999;
    display: none;
  }
  .alert-content{
    font-size: 18px;
    color: #333;
    margin-bottom: 20px;
    line-height: 1.5;
  }
  .alert-btn{
    padding: 10px 25px;
    border: none;
    border-radius: 8px;
    background-color: #8B4513;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
  }
  .alert-mask{
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.3);
    z-index: 9998;
    display: none;
  }
</style>
</head>
<body>
<!-- 自定义弹窗 -->
<div class="alert-mask" id="alertMask"></div>
<div class="custom-alert" id="customAlert">
  <div class="alert-content" id="alertContent"></div>
  <button class="alert-btn" id="alertBtn">确定</button>
</div>

<div class="game-container">
  <div class="game-title">水浒猜猜猜</div>
  <div class="score-area">当前积分：<span id="scoreNum">0</span></div>
  <div class="hint-area" id="hintBox">点击「开始游戏」按钮开始挑战</div>
  <input type="text" class="answer-input" id="answerInput" placeholder="请输入你猜测的水浒人物名字">
  <!-- 按钮顺序：获取提示→提交答案→查看答案→跳过本题→开始游戏→退出游戏 -->
  <button class="game-btn btn-hint" disabled>获取提示</button>
  <button class="game-btn btn-submit" disabled>提交答案</button>
  <button class="game-btn btn-answer" disabled>查看答案</button>
  <button class="game-btn btn-skip" disabled>跳过本题</button>
  <button class="game-btn btn-start">开始游戏</button>
  <button class="game-btn btn-exit" disabled>退出游戏</button>
</div>

<script src="data.js"></script>
<script src="main.js"></script>
</body>
</html>
